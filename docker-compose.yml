# ═══════════════════════════════════════════════════════
# Lighter Quant Bot — Docker Compose
#
# 快速启动:
#   1. cp .env.example .env
#   2. 编辑 .env 填入 API 凭证
#   3. docker compose up -d
#   4. 访问 http://localhost:2028 查看 Dashboard
# ═══════════════════════════════════════════════════════

services:
  lighter-bot:
    build: .
    container_name: lighter-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "2028:2028"
    volumes:
      # PnL 数据持久化 (交易历史、净值曲线)
      - bot-data:/app/data
      # 可选: 挂载自定义配置
      # - ./config/settings.yaml:/app/config/settings.yaml:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2028/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
    driver: local
