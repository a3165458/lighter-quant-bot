# Lighter交易所配置
lighter:
  # API密钥（通过环境变量 LIGHTER_API_KEY 和 LIGHTER_SECRET_KEY 设置）
  api_key: "${LIGHTER_API_KEY}"
  secret_key: "${LIGHTER_SECRET_KEY}"
  
  # 网络配置
  networks:
    testnet:
      rest_url: "https://testnet.lighter.xyz/api/v1"
      ws_url: "wss://testnet.lighter.xyz/ws"
    mainnet:
      rest_url: "https://api.lighter.xyz/api/v1"
      ws_url: "wss://lighter.xyz/ws"
  
  # 连接参数
  connection:
    timeout_ms: 10000
    retry_count: 5
    retry_delay_ms: 1000
    heartbeat_interval_ms: 30000

# 交易配置
trading:
  # 交易对
  symbols: ["BTCUSDT", "ETHUSDT"]
  
  # 策略配置
  strategies:
    grid_trading:
      enabled: true
      grid_count: 20
      investment_per_grid: 50
      price_deviation: 0.015
    
    trend_following:
      enabled: false
      fast_ma: 7
      slow_ma: 21
      stop_loss: 0.03
      take_profit: 0.06
  
  # 仓位管理
  position:
    max_single_trade_percent: 5
    max_total_position_percent: 40
    risk_per_trade_percent: 1

# 风控配置
risk:
  # 止损设置
  stop_loss:
    enabled: true
    max_drawdown_percent: 10
    daily_loss_limit_percent: 5
    
  # 仓位限制
  position_limit:
    max_leverage: 3
    max_position_size: 10000
    
  # 监控频率
  monitoring_interval_ms: 1000

# 回测配置
backtest:
  data:
    start_date: "2024-01-01"
    end_date: "2024-06-01"
    interval: "1h"
    
  initial_capital: 10000
  commission_percent: 0.1
  slippage_percent: 0.05
  
  # 回测报告
  reporting:
    generate_html: true
    save_trades: true
    plot_equity_curve: true

# 监控面板配置  
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 2028
  refresh_interval_ms: 1000
  
  # 图表配置
  charts:
    equity_curve_points: 1000
    order_book_depth: 20

# 日志配置
logging:
  level: "info"
  file: "logs/lighter-bot.log"
  rotation: "daily"
  format: "json"
